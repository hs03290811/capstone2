version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ssg-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: guardian_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ssg-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: