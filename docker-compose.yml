version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ssg-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: guardian_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ssg-redis
    restart: always
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: ssg-app
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://admin:password123@db:5432/guardian_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  postgres_data: