<!DOCTYPE html>
<html>
<head>
    <title>보안 로그인 테스트</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>🔒 보안 로그인 시스템</h1>
    <input type="text" id="username" placeholder="아이디">
    <input type="password" id="password" placeholder="비밀번호">
    <button onclick="login()">로그인</button>


<div id="mfa-section" style="display:none; text-align: center;">
    <hr>
    <h3>📱 2단계 인증이 필요합니다</h3>
    <p>등록된 모바일 기기에서 QR 코드를 스캔하세요.</p>
    
    <!-- 🚀 이 태그가 핵심입니다 -->
    <div style="margin: 20px 0;">
        <img id="qr-image" src="" alt="QR 로딩 중" style="width:200px; height:200px; display: inline-block;">
    </div>

    <div id="timer" style="color: red; font-weight: bold;">남은 시간: 03:00</div>
</div>

    <script src="script.js"></script>
</body>
</html>
