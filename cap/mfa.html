<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생체 보안 인증</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f2f2f7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: white; width: 85%; max-width: 350px; padding: 40px; border-radius: 28px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .faceid-logo { width: 80px; height: 80px; margin-bottom: 20px; }
        .auth-btn { background-color: #007aff; color: white; border: none; width: 100%; padding: 18px; border-radius: 14px; font-size: 17px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="auth-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/ab/Face_ID_logo.svg/512px-Face_ID_logo.svg.png" class="faceid-logo">
        <h2>FaceID 인증</h2>
        <p>본인 확인을 위해 인증이 필요합니다.</p>
        <button class="auth-btn" onclick="runFaceID()">인증 시작하기</button>
        <div id="status-msg"></div>
    </div>

    <script>
        async function runFaceID() {
            const isConfirmed = confirm("FaceID 인증을 진행하시겠습니까?");
            if (isConfirmed) {
                const user = new URLSearchParams(window.location.search).get('user');
                try {
                    const response = await fetch('http://34.207.73.29:8001/auth/verify-mfa', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ "username": user, "success": true })
                    });
                    if (response.ok) alert("인증 완료! PC를 확인하세요.");
                } catch (err) {
                    alert("서버 전송 실패");
                }
            }
        }
    </script>
</body>
</html>
